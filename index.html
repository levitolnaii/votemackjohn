<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vote Mack John</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.45;
      overflow-x: hidden;
    }

    .top-hero {
      height: 100vh;
      min-height: 680px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    h1 {
      color: #ffffff;
      font-size: clamp(6rem, 20vw, 28rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      line-height: 0.88;
      text-shadow: 
        0 0 30px rgba(255, 255, 255, 0.5),
        0 0 80px rgba(200, 35, 51, 0.7),
        0 0 140px rgba(178, 34, 34, 0.4);
      animation: pulse 10s infinite alternate 3s;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1.8s ease-out, transform 1.8s ease-out;
    }

    h1.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes pulse {
      0%   { text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 0 80px rgba(200,35,51,0.5); }
      100% { text-shadow: 0 0 50px rgba(255,255,255,0.7), 0 0 120px rgba(200,35,51,0.9), 0 0 200px rgba(178,34,34,0.6); }
    }

    .content-section {
      position: relative;
      min-height: 100vh;
      padding: 80px 5% 100px;
      max-width: 1800px;
      margin: 0 auto;
    }

    .text-content {
      position: relative;
      max-width: 50%;
      margin-left: auto;
      z-index: 3;               /* Higher than photo so text is always on top */
      padding-right: 8%;
      text-align: left;
      opacity: 1;
    }

    .text-content h2 {
      font-size: clamp(3.5rem, 8vw, 6.5rem);
      font-weight: 900;
      color: #c1121f;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 30px;
      line-height: 0.95;
      text-shadow: 0 4px 12px rgba(0,0,0,0.8);
    }

    .text-content p {
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      margin-bottom: 1.8em;
      font-weight: 500;
      opacity: 0.95;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    .highlight {
      color: #ff3333;
      font-weight: 900;
    }

    .cta {
      display: inline-block;
      margin-top: 40px;
      padding: 20px 60px;
      background: #c1121f;
      color: white;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      text-decoration: none;
      border-radius: 0;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border: 4px solid #ffffff;
      box-shadow: 0 10px 40px rgba(193, 18, 31, 0.7);
      transition: all 0.3s;
    }

    .cta:hover {
      background: #ffffff;
      color: #c1121f;
      border-color: #c1121f;
      transform: scale(1.05);
    }

    .photo-container {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 58%;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      transform: translateX(-120px);
      transition: opacity 1.2s ease-out 0.3s, transform 1.2s ease-out 0.3s;
    }

    .photo-container.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: left center;
      filter: brightness(1.05) contrast(1.1);
      box-shadow: 40px 0 100px rgba(0,0,0,0.95);
    }

    .photo-container::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 50%, rgba(200, 50, 50, 0.5) 0%, transparent 70%);
      filter: blur(100px);
      opacity: 0.8;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    @media (max-width: 1100px) {
      .content-section {
        padding: 60px 8%;
      }
      .text-content {
        max-width: 100%;
        margin-left: 0;
        padding-right: 0;
        text-align: center;
        z-index: 2;
      }
      .photo-container {
        position: relative;
        width: 100%;
        height: 65vh;
        margin: 50px 0 0;
        opacity: 1;
        transform: none;
        transition: none;
      }
      .photo-container img {
        object-position: center;
      }
    }

    @media (max-width: 600px) {
      .top-hero {
        min-height: 60vh;
      }
      h1 {
        font-size: clamp(4.5rem, 22vw, 14rem);
      }
      .text-content h2 {
        font-size: clamp(2.8rem, 10vw, 5rem);
      }
    }
  </style>
</head>
<body>

  <div class="top-hero">
    <h1 id="heroText">VOTE<br>MACK JOHN</h1>
  </div>

  <section class="content-section">
    <div class="photo-container" id="photo">
      <!-- Replace this src with your ACTUAL photo URL -->
      <img src="https://cdn.discordapp.com/attachments/1112852946430984202/1483533729640222871/mack1.jpg?ex=69baeff3&is=69b99e73&hm=fb430ef986ea075e0602581c22eb5abb84b7dde456dc5ca5019bdc6eb1819d3e&" 
           alt="Mack John">
    </div>

    <div class="text-content">
      <h2>MACK JOHN<br>2026</h2>
      <p>Mack John will <span class="highlight">NEVER BACK DOWN</span> in his fight to improve Chancellor's School.</p>
      <p>But he can’t do it alone. It’s going to take all of us, working together, to pull off a <span class="highlight">MASSIVE</span> victory that’s <span class="highlight">TOO BIG TO IGNORE!</span></p>
      
      <a href="#" class="cta">YOUR VOTE COUNTS</a>
    </div>
  </section>

  <script>
    const heroText = document.getElementById('heroText');
    const photo = document.getElementById('photo');

    // Fade in hero text first
    setTimeout(() => {
      heroText.classList.add('visible');
    }, 400);

    // Mack appears only on scroll
    window.addEventListener('scroll', function() {
      const heroHeight = window.innerHeight;
      const scrollPos = window.scrollY;

      if (scrollPos > heroHeight * 0.15) {
        photo.classList.add('visible');
      }
    });

    // If already scrolled on load
    if (window.scrollY > window.innerHeight * 0.15) {
      photo.classList.add('visible');
    }
  </script>

</body>
</html>
