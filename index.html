<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vote Mack John</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #001f3f, #0074D9);
color: white;
text-align: center;
}

header {
padding: 40px 20px;
}

h1 {
font-size: 3em;
margin: 0;
}

h2 {
font-weight: normal;
margin-top: 10px;
}

.container {
padding: 30px;
}

.card {
background: rgba(255,255,255,0.1);
border-radius: 15px;
padding: 30px;
max-width: 500px;
margin: 20px auto;
box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

button {
background: #FF4136;
border: none;
padding: 15px 30px;
font-size: 1.2em;
color: white;
border-radius: 10px;
cursor: pointer;
transition: 0.3s;
}

button:hover {
background: #ff725c;
transform: scale(1.05);
}

.counter {
font-size: 2em;
margin: 20px 0;
}

footer {
margin-top: 40px;
font-size: 0.9em;
opacity: 0.7;
}
</style>
</head>

<body>

<header>
<h1>🇬🇧 Vote Mack John 🇬🇧</h1>
<h2>The Future Starts Now</h2>
</header>

<div class="container">

<div class="card">
<p>
Mack John stands for progress, good vibes, and legendary decisions.
</p>

<div class="counter" id="votes">0 Votes</div>

<button onclick="vote()">Vote Now</button>
</div>

<div class="card">
<h3>Why Vote Mack?</h3>
<ul style="list-style:none; padding:0;">
<li>✔ Top-tier leadership</li>
<li>✔ Unmatched charisma</li>
<li>✔ Probably brings snacks</li>
</ul>
</div>

</div>

<footer>
Not an official election. Just vibes.
</footer>

<script>
let votes = localStorage.getItem("mackVotes") || 0;

document.getElementById("votes").innerText = votes + " Votes";

function vote() {
votes++;
localStorage.setItem("mackVotes", votes);
document.getElementById("votes").innerText = votes + " Votes";
}
</script>

</body>
</html>
