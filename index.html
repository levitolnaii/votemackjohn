<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vote Mack John</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000000;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    .hero {
      text-align: center;
      padding: 40px;
    }
    h1 {
      color: #ffffff;
      font-size: clamp(5rem, 18vw, 22rem); /* scales huge on big screens, still readable on mobile */
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 0.92;
      text-shadow: 
        0 0 20px rgba(255, 255, 255, 0.4),
        0 0 60px rgba(178, 34, 34, 0.6),
        0 0 120px rgba(178, 34, 34, 0.3);
      animation: pulse 8s infinite alternate;
    }
    @keyframes pulse {
      0%   { text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 60px rgba(178,34,34,0.4); }
      100% { text-shadow: 0 0 40px rgba(255,255,255,0.6), 0 0 100px rgba(178,34,34,0.8), 0 0 180px rgba(178,34,34,0.5); }
    }
    @media (max-width: 600px) {
      h1 {
        font-size: clamp(4.5rem, 22vw, 12rem);
        letter-spacing: 0.06em;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>VOTE<br>MACK JOHN</h1>
  </div>

</body>
</html>
